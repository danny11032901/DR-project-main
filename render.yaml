services:
  # PostgreSQL Database (Managed)
  - type: pserv
    name: retinaiq-postgres
    runtime: postgres15
    plan: free
    ipAllowList: []
    postgresDatabaseName: retinaiq
    postgresUsername: retinaiq_user
    postgresVersion: "15"

  # Redis Cache & Message Broker (Managed)
  - type: pserv
    name: retinaiq-redis
    runtime: redis7
    plan: free
    ipAllowList: []

  # Backend API Server
  - type: web
    name: retinaiq-backend
    runtime: docker
    plan: free
    region: oregon
    docker:
      file: ./backend/Dockerfile
      context: ./backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: retinaiq-postgres
          property: connectionString
      - key: REDIS_URL
        value: redis://:@retinaiq-redis:6379
      - key: CELERY_BROKER_URL
        value: redis://:@retinaiq-redis:6379/1
      - key: CELERY_RESULT_BACKEND
        value: redis://:@retinaiq-redis:6379/2
      - key: STORAGE_BACKEND
        value: local
      - key: MINIO_BUCKET_NAME
        value: retinaiq-images
      - key: FRONTEND_URL
        fromService:
          type: web
          name: retinaiq-frontend
          property: url
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: LOG_LEVEL
        value: INFO
      - key: AUTO_TRAIN_IF_MISSING
        value: "false"
      - key: IMAGE_QUALITY_THRESHOLD
        value: "40"
      - key: MAX_UPLOAD_SIZE_MB
        value: "20"
    port: 8000
    disk:
      name: ml-models
      size: 10
      mountPath: /app/ml_models
    preDeployCommand: cd /app && python -m alembic upgrade head && python scripts/download_models.py
    depends_on:
      - retinaiq-postgres
      - retinaiq-redis

  # Celery Worker
  - type: worker
    name: retinaiq-celery-worker
    runtime: docker
    plan: free
    docker:
      file: ./backend/Dockerfile
      context: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: retinaiq-postgres
          property: connectionString
      - key: REDIS_URL
        value: redis://:@retinaiq-redis:6379
      - key: CELERY_BROKER_URL
        value: redis://:@retinaiq-redis:6379/1
      - key: CELERY_RESULT_BACKEND
        value: redis://:@retinaiq-redis:6379/2
      - key: STORAGE_BACKEND
        value: local
      - key: MINIO_BUCKET_NAME
        value: retinaiq-images
      - key: AUTO_TRAIN_IF_MISSING
        value: "false"
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: ml-models-worker
      size: 10
      mountPath: /app/ml_models
    depends_on:
      - retinaiq-postgres
      - retinaiq-redis
      - retinaiq-backend

  # Frontend
  - type: web
    name: retinaiq-frontend
    runtime: docker
    plan: free
    region: oregon
    docker:
      file: ./frontend/Dockerfile
      context: ./frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: retinaiq-backend
          property: url
    healthCheckPath: /
    buildCommand: npm run build
