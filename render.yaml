databases:
  - name: retinaiq-postgres
    plan: free
    databaseName: retinaiq
    user: retinaiq_user

services:
  # Redis / Key Value
  - type: keyvalue
    name: retinaiq-redis
    plan: free
    ipAllowList: []

  # Backend API Server
  - type: web
    name: retinaiq-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: retinaiq-postgres
          property: connectionString
      - key: REDIS_URL
        value: redis://:@retinaiq-redis:6379
      - key: CELERY_BROKER_URL
        value: redis://:@retinaiq-redis:6379/1
      - key: CELERY_RESULT_BACKEND
        value: redis://:@retinaiq-redis:6379/2
      - key: STORAGE_BACKEND
        value: local
      - key: MINIO_BUCKET_NAME
        value: retinaiq-images
      - key: FRONTEND_URL
        fromService:
          type: web
          name: retinaiq-frontend
          property: hostport
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: LOG_LEVEL
        value: INFO
      - key: AUTO_TRAIN_IF_MISSING
        value: "false"
      - key: IMAGE_QUALITY_THRESHOLD
        value: "40"
      - key: MAX_UPLOAD_SIZE_MB
        value: "20"

  # Celery Worker
  - type: worker
    name: retinaiq-celery-worker
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: retinaiq-postgres
          property: connectionString
      - key: REDIS_URL
        value: redis://:@retinaiq-redis:6379
      - key: CELERY_BROKER_URL
        value: redis://:@retinaiq-redis:6379/1
      - key: CELERY_RESULT_BACKEND
        value: redis://:@retinaiq-redis:6379/2
      - key: STORAGE_BACKEND
        value: local
      - key: MINIO_BUCKET_NAME
        value: retinaiq-images
      - key: AUTO_TRAIN_IF_MISSING
        value: "false"
      - key: LOG_LEVEL
        value: INFO

  # Frontend
  - type: web
    name: retinaiq-frontend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    healthCheckPath: /
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: retinaiq-backend
          property: hostport